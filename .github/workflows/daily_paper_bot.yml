name: Daily ArXiv Paper Bot

on:
  schedule:
    - cron: '0 0 * * *'  # 每天UTC 0点运行 (北京时间8点)
  workflow_dispatch:  # 支持手动触发

jobs:
  run-paper-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install arxiv google-generativeai requests
      
      - name: Run paper bot
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          python main.py
